<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VBA-GBT | Ana Sayfa</title>
  <meta name="description" content="VBA-GBT projesi ana sayfası. Renk araçları ve interaktif içerikler." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --c1: #0d0d1a;
      --c2: #12122a;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f472b6;
      --gold: #fbbf24;
      --white: #f8fafc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; scroll-behavior: smooth; }

    body {
      min-height: 100%;
      background: var(--c1);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ─── CUSTOM CURSOR ─────────────────────────────────────── */
    #cursor-dot {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--accent3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .15s, height .15s, background .2s;
      box-shadow: 0 0 12px var(--accent3), 0 0 30px var(--accent3);
    }

    #cursor-ring {
      position: fixed;
      width: 38px; height: 38px;
      border: 2px solid rgba(124, 58, 237, .6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform .08s linear, width .2s, height .2s, border-color .2s;
    }

    body:has(a:hover) #cursor-dot, body:has(button:hover) #cursor-dot {
      width: 18px; height: 18px;
      background: var(--gold);
      box-shadow: 0 0 20px var(--gold), 0 0 50px var(--gold);
    }

    body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring {
      width: 60px; height: 60px;
      border-color: var(--gold);
    }

    /* ─── PARTICLE CANVAS ─────────────────────────────────────── */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── MOUSE GLOW ─────────────────────────────────────── */
    #mouse-glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      transition: transform .05s linear;
    }

    /* ─── BACKGROUND GRID ─────────────────────────────────────── */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,.08) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ─── CONTENT ─────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 3rem;
    }

    /* ─── BADGE ─────────────────────────────────────── */
    .badge {
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid rgba(6,182,212,.3);
      padding: .4rem 1.2rem;
      border-radius: 100px;
      backdrop-filter: blur(8px);
      background: rgba(6,182,212,.06);
      animation: fadeInDown .8s ease both;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── HERO TITLE ─────────────────────────────────────── */
    .hero-title {
      text-align: center;
      animation: fadeInUp 1s .1s ease both;
    }

    .hero-title h1 {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #f8fafc 0%, var(--accent2) 40%, var(--accent) 70%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(124,58,237,.4));
    }

    .hero-title .sub {
      margin-top: 1.2rem;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      color: rgba(248,250,252,.55);
      letter-spacing: .04em;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── DECORATIVE ORBS ─────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 6s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,.35), transparent 70%);
      top: -150px; left: -100px;
      animation-duration: 7s;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,114,182,.25), transparent 70%);
      bottom: -100px; right: -100px;
      animation-duration: 9s;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(6,182,212,.2), transparent 70%);
      top: 40%; left: 60%;
      animation-duration: 11s;
      animation-delay: -5s;
    }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -40px) scale(1.05); }
    }

    /* ─── CTA BUTTON ─────────────────────────────────────── */
    .cta-wrap {
      animation: fadeInUp 1s .3s ease both;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      position: relative;
      padding: 1.1rem 2.8rem;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-decoration: none;
      color: var(--white);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
      border: none;
      cursor: none;
      overflow: hidden;
      box-shadow:
        0 0 0 0 rgba(124,58,237,.5),
        0 20px 60px -10px rgba(124,58,237,.45);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .25s ease;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .cta-btn:hover::before { transform: translateX(100%); }

    .cta-btn:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow:
        0 0 0 6px rgba(124,58,237,.15),
        0 30px 80px -10px rgba(124,58,237,.6);
    }

    .cta-btn:active { transform: translateY(-1px) scale(1.01); }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }

    .cta-btn:hover .btn-icon { transform: rotate(15deg) scale(1.2); }

    /* ─── FEATURE CARDS ─────────────────────────────────────── */
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeInUp 1s .5s ease both;
    }

    .card {
      width: 200px;
      padding: 1.5rem;
      border-radius: 20px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(16px);
      text-align: center;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1),
                  background .3s ease,
                  border-color .3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      background: rgba(124,58,237,.1);
      border-color: rgba(124,58,237,.35);
    }

    .card-icon {
      font-size: 2.2rem;
      margin-bottom: .75rem;
      display: block;
      filter: drop-shadow(0 0 10px currentColor);
    }

    .card-label {
      font-size: .9rem;
      font-weight: 600;
      color: rgba(248,250,252,.7);
      letter-spacing: .05em;
    }

    /* ─── FOOTER LINE ─────────────────────────────────────── */
    .footer-line {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: rgba(248,250,252,.2);
      letter-spacing: .15em;
      animation: fadeInUp 1s .7s ease both;
    }

    /* ─── TRAIL ─────────────────────────────────────── */
    .trail-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9997;
      transform: translate(-50%, -50%);
    }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .cards { gap: 1rem; }
      .card { width: 150px; padding: 1.2rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- Custom Cursor -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- Mouse Glow -->
  <div id="mouse-glow"></div>

  <!-- Particle Canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main Content -->
  <main class="wrapper">
    <span class="badge">✦ VBA-GBT Proje Portali ✦</span>

    <div class="hero-title">
      <h1>VBA-GBT</h1>
      <p class="sub">İnteraktif araçlar, görsel araştırmalar &amp; deneyimler</p>
    </div>

    <div class="cta-wrap">
      <a href="renk.html" class="cta-btn" id="renk-btn">
        <span class="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </span>
        Renk Dünyasına Gir
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="cards">
      <div class="card">
        <span class="card-icon" style="color:#7c3aed;">🎨</span>
        <div class="card-label">Renk Analizi</div>
      </div>
      <div class="card">
        <span class="card-icon" style="color:#06b6d4;">✨</span>
        <div class="card-label">İnteraktif</div>
      </div>
      <div class="card">
        <span class="card-icon" style="color:#f472b6;">🌈</span>
        <div class="card-label">Görsel Efektler</div>
      </div>
    </div>

    <p class="footer-line">VBA-GBT &nbsp;·&nbsp; 2026 &nbsp;·&nbsp; Tüm hakları saklıdır</p>
  </main>

  <script>
    /* ─── CURSOR ─────────── */
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    const glow = document.getElementById('mouse-glow');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left  = mx + 'px';
      dot.style.top   = my + 'px';
      glow.style.left = mx + 'px';
      glow.style.top  = my + 'px';
    });

    function lerpRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(lerpRing);
    }
    lerpRing();

    /* ─── TRAIL ─────────── */
    const TRAIL_LEN = 18;
    const trail = [];
    const colors = ['#7c3aed','#9333ea','#a855f7','#c084fc','#f472b6','#fb7185','#06b6d4','#22d3ee'];

    for (let i = 0; i < TRAIL_LEN; i++) {
      const el = document.createElement('div');
      el.classList.add('trail-dot');
      document.body.appendChild(el);
      trail.push({ el, x: 0, y: 0 });
    }

    function animateTrail() {
      let px = mx, py = my;
      trail.forEach((t, i) => {
        const lag = 1 - (i / TRAIL_LEN) * 0.8;
        t.x += (px - t.x) * (0.25 - i * 0.008);
        t.y += (py - t.y) * (0.25 - i * 0.008);
        const size = (TRAIL_LEN - i) / TRAIL_LEN * 7;
        const alpha = (TRAIL_LEN - i) / TRAIL_LEN * 0.7;
        t.el.style.left    = t.x + 'px';
        t.el.style.top     = t.y + 'px';
        t.el.style.width   = size + 'px';
        t.el.style.height  = size + 'px';
        t.el.style.background = colors[i % colors.length];
        t.el.style.opacity = alpha;
        t.el.style.boxShadow = `0 0 ${size * 2}px ${colors[i % colors.length]}`;
        px = t.x; py = t.y;
      });
      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    /* ─── PARTICLE CANVAS ─────────── */
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const PARTICLE_COUNT = 90;
    const PCOLORS = ['rgba(124,58,237,', 'rgba(6,182,212,', 'rgba(244,114,182,', 'rgba(251,191,36,'];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * 1920,
        y: Math.random() * 1080,
        r: Math.random() * 2 + 0.5,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        c: PCOLORS[Math.floor(Math.random() * PCOLORS.length)],
        a: Math.random() * 0.6 + 0.2,
      });
    }

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);

      // Mouse influence
      particles.forEach(p => {
        const dx = mx - p.x, dy = my - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          p.vx -= dx / dist * 0.06;
          p.vy -= dy / dist * 0.06;
        }
        p.vx *= 0.98; p.vy *= 0.98;
        p.x += p.vx; p.y += p.vy;

        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        // Draw
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.c + p.a + ')';
        ctx.fill();
      });

      // Connect nearby particles
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(124,58,237,${(1 - d / 100) * 0.15})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    /* ─── CLICK BURST ─────────── */
    document.addEventListener('click', e => {
      const burst = 12;
      for (let i = 0; i < burst; i++) {
        const el = document.createElement('div');
        const angle  = (i / burst) * Math.PI * 2;
        const speed  = Math.random() * 80 + 40;
        const size   = Math.random() * 6 + 3;
        const color  = colors[Math.floor(Math.random() * colors.length)];
        el.style.cssText = `
          position:fixed;left:${e.clientX}px;top:${e.clientY}px;
          width:${size}px;height:${size}px;border-radius:50%;
          background:${color};pointer-events:none;z-index:9996;
          transform:translate(-50%,-50%);
          box-shadow:0 0 ${size * 3}px ${color};
        `;
        document.body.appendChild(el);
        const tx = Math.cos(angle) * speed;
        const ty = Math.sin(angle) * speed;
        el.animate([
          { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
          { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
        ], { duration: 600, easing: 'cubic-bezier(.2,.8,.3,1)', fill: 'forwards' })
          .onfinish = () => el.remove();
      }
    });
  </script>
</body>
</html>
